<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>How is your stay? · Guest feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450..650&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="stylesheet" href="/assets/css/audit.css">
  <style>
    /* Author display rules on .btn-primary would otherwise beat the UA [hidden]
       rule, leaving toggled buttons visible — force hidden to win. */
    [hidden] { display: none !important; }
    .fb-wrap { max-width: 520px; margin: 0 auto; padding: 48px 20px 80px; }
    .fb-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 30px 26px; }
    .fb-eyebrow { font-size: .72rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); }
    #fb-context { font-size: .84rem; color: var(--muted); margin-top: 4px; }
    .stars { display: flex; gap: 8px; margin: 20px 0 6px; }
    .star {
      font-size: 2.4rem; line-height: 1; cursor: pointer; color: var(--line);
      background: none; border: none; padding: 2px; transition: color .12s, transform .12s;
    }
    .star:hover { transform: scale(1.08); }
    .star.on { color: #e0a52e; }
    .star:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
    .fb-scale { display: flex; justify-content: space-between; font-size: .72rem; color: var(--muted); margin-bottom: 18px; }
    .fb-field { margin-bottom: 16px; }
    .fb-field label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: 6px; }
    .fb-field textarea, .fb-field input { width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 8px; font: inherit; font-size: .92rem; background: #fff; color: var(--ink); }
    .fb-field textarea:focus, .fb-field input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    .consent-row { display: flex; gap: 10px; align-items: flex-start; font-size: .82rem; color: rgba(23,36,31,.75); margin-bottom: 16px; }
    .consent-row input { width: auto; margin-top: 3px; }
    .form-status { border-radius: 8px; padding: 11px 13px; font-size: .86rem; margin-bottom: 14px; }
    .form-status-error { background: rgba(163,64,46,.1); color: var(--danger); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    #fb-thanks { text-align: center; }
    #fb-thanks h2 { margin-bottom: 12px; }
    #fb-thanks .cta-row { justify-content: center; margin-top: 22px; }
    .fb-foot { text-align: center; font-size: .72rem; color: var(--muted); margin-top: 20px; }
  </style>
</head>
<body>
  <div class="fb-wrap">
    <div class="fb-card">
      <p class="fb-eyebrow" data-brand>our villas</p>
      <p id="fb-context" hidden></p>
      <h2 id="fb-question" style="margin-top:8px">How was your stay with <span data-brand>us</span>?</h2>

      <form id="feedback-form" novalidate>
        <div class="stars" role="radiogroup" aria-label="Rating from 1 to 5 stars">
          <button type="button" class="star" data-v="1" role="radio" aria-label="1 star" tabindex="0">★</button>
          <button type="button" class="star" data-v="2" role="radio" aria-label="2 stars" tabindex="0">★</button>
          <button type="button" class="star" data-v="3" role="radio" aria-label="3 stars" tabindex="0">★</button>
          <button type="button" class="star" data-v="4" role="radio" aria-label="4 stars" tabindex="0">★</button>
          <button type="button" class="star" data-v="5" role="radio" aria-label="5 stars" tabindex="0">★</button>
        </div>
        <div class="fb-scale"><span>Not great</span><span>Perfect</span></div>
        <input type="hidden" id="fb-rating" name="rating" value="">

        <div class="fb-field">
          <label id="fb-comment-label" for="fb-comment">Tell us more (optional)</label>
          <textarea id="fb-comment" name="comment" rows="3"></textarea>
        </div>

        <div id="fb-contact-wrap" hidden>
          <div class="fb-field">
            <label for="fb-wa">Your WhatsApp — so we can make it right</label>
            <input id="fb-wa" name="whatsapp" inputmode="tel" placeholder="+62 …">
          </div>
          <div class="consent-row">
            <input id="fb-consent" name="consent" type="checkbox">
            <label for="fb-consent" style="font-weight:400">Yes, the team may contact me about this feedback.</label>
          </div>
        </div>

        <div style="position:absolute;left:-9999px" aria-hidden="true">
          <label for="fb-web">Website</label><input id="fb-web" name="website" tabindex="-1" autocomplete="off">
        </div>

        <div id="fb-status" class="form-status" hidden></div>
        <button type="submit" class="btn-primary" style="width:100%" disabled>Send feedback</button>
      </form>

      <div id="fb-thanks" hidden tabindex="-1">
        <h2 id="fb-thanks-title">Thank you!</h2>
        <p id="fb-thanks-body"></p>
        <div class="cta-row">
          <a id="fb-thanks-primary" class="btn-primary" hidden target="_blank" rel="noopener"></a>
        </div>
        <a id="fb-thanks-secondary" hidden target="_blank" rel="noopener" style="display:inline-block;margin-top:14px;font-size:.84rem"></a>
      </div>
    </div>
    <p class="fb-foot">Powered by Villa Ops OS · your feedback goes straight to the team.</p>
  </div>

  <script type="module" src="/assets/js/feedback-page.js"></script>
</body>
</html>
