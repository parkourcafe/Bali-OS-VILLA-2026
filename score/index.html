<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Villa Response Readiness assessment — Selena Systems</title>
<meta name="description" content="A 90-second self-assessment of how your villa operation handles guest inquiries.">
<meta name="robots" content="noindex, follow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2317241f'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='17' fill='%231f6b5b'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>

<header class="site">
  <div class="site-in">
    <a class="wordmark" href="/"><b>Selena</b> Systems</a>
  </div>
</header>

<main class="quiz-shell">
  <p class="progress" id="progress" aria-live="polite">Step 1 of 12</p>
  <div class="progress-bar" aria-hidden="true"><i id="progress-fill" style="width:8%"></i></div>

  <form id="quiz-form" novalidate>
    <div id="step-root"></div>
    <p class="sr-only" role="status" aria-live="polite" id="live-status"></p>
    <div id="submit-alert" class="form-alert hidden" role="alert" aria-live="assertive"></div>
    <div class="q-nav">
      <button type="button" class="btn-back hidden" id="btn-back">&larr; Back</button>
      <button type="button" class="btn btn-primary hidden" id="btn-next">Continue</button>
      <button type="submit" class="btn btn-primary hidden" id="btn-submit">Show my score</button>
    </div>
    <p class="small hidden" id="microcopy" style="margin-top:16px;white-space:pre-line"></p>
    <!-- Honeypot: humans never see or fill this -->
    <div class="hp-field" aria-hidden="true">
      <label for="hp-website2">Leave this field empty</label>
      <input type="text" id="hp-website2" name="website2" tabindex="-1" autocomplete="off">
    </div>
  </form>
</main>

<script type="module" src="/assets/js/quiz.js"></script>
</body>
</html>
