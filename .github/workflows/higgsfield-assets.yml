name: Fetch Higgsfield assets

# Temporary helper: the Claude sandbox egress proxy blocks the Higgsfield CDN,
# so this one-shot job downloads the regenerated pause-3 candidates (the first
# take leaked camera-metadata text into the frame), compresses them, and
# commits them to this branch. The workflow file is removed before merge.

on:
  push:
    branches:
      - claude/pause-photos-hero-video-abjbp2
    paths:
      - .github/workflows/higgsfield-assets.yml

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CDN: https://d8j0ntlcm91z4.cloudfront.net/user_3EKntK4EDjG8nay4H1dy1TK30mB
      C1: hf_20260712_094947_ce07b1a5-2f18-41b5-b4a1-65723fe4a92d.png
      C2: hf_20260712_094947_3058cb4d-5fa0-4809-8b6c-a6ad353b802f.png
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Download and convert pause-3 candidates
        run: |
          mkdir -p /tmp/hf
          curl -sS --fail -o /tmp/hf/c1.png "$CDN/$C1"
          curl -sS --fail -o /tmp/hf/c2.png "$CDN/$C2"
          for i in 1 2; do
            for q in 2 3 4 5 6 8 10; do
              ffmpeg -y -loglevel error -i /tmp/hf/c$i.png -vf scale=1920:-2 -q:v $q /tmp/hf/cand-$i.jpg
              size=$(stat -c%s /tmp/hf/cand-$i.jpg)
              echo "cand-$i.jpg q=$q size=$size"
              if [ "$size" -le 450000 ]; then break; fi
            done
          done
          cp /tmp/hf/cand-1.jpg assets/pause-3.jpg
          cp /tmp/hf/cand-2.jpg assets/pause-3-alt.jpg
          ls -la assets/pause-3*.jpg

      - name: Commit assets to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/pause-3.jpg assets/pause-3-alt.jpg
          git commit -m "Replace pause-3 with regenerated candidates (CI asset fetch)"
          git push origin HEAD:claude/pause-photos-hero-video-abjbp2
